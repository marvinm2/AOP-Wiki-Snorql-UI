<!DOCTYPE html>
<html lang="en">
  <head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Explore AOP-Wiki RDF data with SPARQL">
    <meta name="author" content="Marvin Martens">
	<link rel="icon" type="image/png" href="assets/images/AOP_flavico_UM.png">

    <title>AOP-Wiki RDF Explorer</title>
	<link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css" />
	<link rel="stylesheet" type="text/css" href="assets/codemirror/lib/codemirror.css" />
	<link rel="stylesheet" type="text/css" href="assets/codemirror/addon/display/fullscreen.css" />
	<link rel="stylesheet" type="text/css" href="assets/css/bootstrap-treeview.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/css/style.css" />

	<script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
	
    <script src="assets/codemirror/lib/codemirror.js"></script>	
	<script src="assets/codemirror/mode/javascript/javascript.js"></script>
	<script src="assets/codemirror/addon/selection/active-line.js"></script>
	<script src="assets/codemirror/addon/edit/matchbrackets.js"></script>
	<script src="assets/codemirror/addon/display/fullscreen.js"></script>
	<script src="assets/codemirror/sparql.js"></script>		
	
	<script src="assets/js/bootstrap-treeview.min.js"></script>
    <script src="assets/js/sparql.js"></script>
    <script src="assets/js/mustache.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/linkouts.js"></script>
    <script src="assets/js/snorql.js"></script>
	<script src="assets/js/script.js"></script>
  </head>

  <body onload="start()">
 
	<nav class="navbar navbar-default">
      <div class="container-fluid" style="height: 80px">
        <div class="navbar-header">
		  <a class="navbar-brand" id="index-page" href=""><img src="assets/images/AOP-Wiki RDF logo horizontal UM.png" height="55" /></a>
        </div>
        <div id="navbar" class="navbar-collapse collapse">
		  <ul class="nav navbar-nav" id="navbar-linkouts">
		  </ul>
          <form class="navbar-form navbar-right">
            <div class="input-group">
				<span class="input-group-addon">SPARQL Endpoint</span>
				<input size="40" class="form-control mr-sm-2" name="endpoint" id="endpoint"
				       onchange="changeEndpoint();"
				       onkeydown="if(event.key==='Enter'){event.preventDefault();changeEndpoint();}" />
				<span class="input-group-addon" style="background: transparent; border: none; padding: 0 8px;">
				    <span id="endpoint-health-dot" class="endpoint-dot dot-checking"
				          data-toggle="tooltip" data-placement="bottom" title="Checking endpoint..."></span>
				</span>
            </div>
          </form>
        </div><!--/.navbar-collapse -->
      </div>
    </nav>
	
	<div class="snorql container-fluid">
	
		<div class="row">
		
			<div class="col-md-8">
				
				<div class="row">
					<div class="col-md-12">
						<div id="description-panel" class="panel panel-default">
						  <div class="panel-heading">
						    <h4 class="panel-title" id="desc-title"></h4>
						  </div>
						  <div class="panel-body" id="desc-body">
						    <div id="desc-text"></div>
						    <div class="stale-indicator" style="display: none;">Query has been modified</div>
						    <hr id="desc-param-divider" style="display: none;" />
						    <div id="desc-params" style="display: none;"></div>
						  </div>
						</div>
						<textarea name="query" id="querytext" rows="9"></textarea>
						<script>
							var editor = CodeMirror.fromTextArea(document.getElementById("querytext"), {
							  lineNumbers: true,
							  mode: "application/sparql-query",
							  matchBrackets: true,
							  extraKeys: {
							    'Ctrl-Enter': function(cm) { jQuery('#query-button').click(); },
							    'Cmd-Enter': function(cm) { jQuery('#query-button').click(); }
							  }
							});
						</script>
					</div>
				</div>
				
				<div class="row">
					<div class="col-md-12 buttons-holder">		
						<input id="query-button" type="button" class="btn btn-danger" value="Query" />
						<input id="reset-button" type="button" class="btn btn-success" value="Reset" />
						<div class="btn-group">
							<button type="button" class="btn btn-warning dropdown-toggle" data-toggle="dropdown">
								Export <span class="caret"></span>
							</button>
							<ul class="dropdown-menu">
								<li><a id="export-csv" href="#">CSV</a></li>
								<li><a id="export-tsv" href="#">TSV</a></li>
								<li><a id="export-json" href="#">JSON</a></li>
								<li><a id="export-xml" href="#">XML</a></li>
							</ul>
						</div>
						<input id="generate-permalink" type="button" class="btn btn-secondary" value="Get Permalink" />
						<button id="copy-button" type="button" class="btn btn-default"><i class="glyphicon glyphicon-copy"></i> Copy</button>
						<input id="enter-fullscreen" type="button" class="btn btn-dark" value="Fullscreen Mode" />
						<input id="show-prefixes" type="button" class="btn btn-light" value="Show Prefixes" />
					</div>
				</div>
				
			</div>
			
			<div class="col-md-4">
				<h4>SPARQL Examples:</h4>
				<div class="panel panel-default">
				  <div class="panel-heading">
						<div class="input-group">
							<input type="text" class="form-control" id="examples-repo" name="examples-repo" placeholder="Github Repositoty URL" onchange="changeExamplesRepo();">
							<div class="input-group-btn">
								<button id="fetch" class="btn btn-primary"><i class="glyphicon glyphicon-refresh"></i></button>
							</div>
						</div>
				  </div>
				  <div id="examplesMainBody" class="panel-body">
						<!-- <form> -->
						<div class="form-group">
						  <label for="input-search" class="sr-only">Search Tree:</label>
						  <input type="text" class="form-control" id="input-search" placeholder="Search examples..." value="">
						</div>
						<button type="button" class="btn btn-danger" id="btn-search">Search</button>
						<button type="button" class="btn btn-default" id="btn-clear-search">Clear</button>
						<!-- </form> -->
						<hr/>
						<div class="list-group" id="examples"></div>
				  </div>
				</div>
			</div>
		</div>
	</div>
	
	<div class="container-fluid">
	
		<div class="row">
			<div class="col-md-12">
				<div class="pre-scrollable" id="result"><span></span></div>
			</div>
		</div>
	</div>
	
	<footer id="footer" class="footer navbar-fixed-bottom">
	  <div class="container-fluid">
		<p>
		  <a target="_blank" href="https://aopwiki.org">AOP-Wiki</a> |
		  <a target="_blank" href="https://aopwiki.rdf.bigcat-bioinformatics.org/sparql">AOP-Wiki RDF</a> |
		  <a target="_blank" href="https://github.com/marvinm2/AOP-Wiki-Snorql-UI">GitHub</a>
		  &mdash;
		  doi:<a target="_blank" href="https://doi.org/10.1089/aivt.2021.0010">10.1089/aivt.2021.0010</a>
		  &mdash;
		  <a target="_blank" href="https://www.gnu.org/licenses/gpl-3.0.html" title="UI source code licence">UI: GPL-3.0</a>
		  &mdash;
		  <a target="_blank" href="https://creativecommons.org/licenses/by-sa/4.0/" title="AOP-Wiki RDF dataset licence">Data: CC-BY-SA 4.0</a>
		  &mdash;
		  <a target="_blank" href="https://www.maastrichtuniversity.nl/research/translational-genomics"><img src="assets/images/Logo-TGX.png" height="25px" alt="TGX"></a>
		</p>
	  </div>
	</footer>

	<div id="fullscreen-navbar" class="navbar-fixed-top">
	  <div class="container">
		<div class="row">
			<div class="col-md-12">		
				<input id="exit-fullscreen" type="button" class="btn btn-danger" value="Exit Fullscreen" />
				<input id="examples-fullscreen" type="button" class="btn btn-primary" value="Examples" />
			</div>
		</div>
	  </div>
	</div>
	
	<div id="permalinkModal" class="modal" tabindex="-1" role="dialog">
	  <div class="modal-dialog" role="document">
		<div class="modal-content">
		  <div class="modal-header">
			<h3 class="modal-title text-primary">Permanent Link for current query</h3>
		  </div>
		  <div class="modal-body">
			
			<p id="permalink-url"></p>
			
		  </div>
		  <div class="modal-footer">
		  </div>
		</div>
	  </div>
	</div>
	
	<div id="examplesModal" class="modal" tabindex="-1" role="dialog">
	  <div class="modal-dialog" role="document">
		<div class="modal-content">
		  <div class="modal-header">
			<h3 class="modal-title text-primary">SPARQL Examples</h3>
		  </div>
		  <div id="examplesModalBody" class="modal-body">
			<!-- <form> -->
			<div class="form-group">
			  <label for="input-search" class="sr-only">Search Tree:</label>
			  <input type="text" class="form-control" id="input-search-fs" placeholder="Search examples..." value="">
			</div>
			<button type="button" class="btn btn-danger" id="btn-search-fs">Search</button>
			<button type="button" class="btn btn-default" id="btn-clear-search-fs">Clear</button>
			<!-- </form> -->
			<hr/>
			<div class="list-group" id="examples-fs"></div> 
		  </div>
		  <div class="modal-footer">
		  </div>
		</div>
	  </div>
	</div>
	
	<div id="prefixesModal" class="modal" tabindex="-1" role="dialog">
	  <div class="modal-dialog" role="document">
		<div class="modal-content">
		  <div class="modal-header">
			<h3 class="modal-title text-primary">SPARQL endpoint's available prefixes</h3>
		  </div>
		  <div id="prefixesModalBody" class="modal-body">
			
		  </div>
		  <div class="modal-footer">
		  </div>
		</div>
	  </div>
	</div>
  </body>
</html>
