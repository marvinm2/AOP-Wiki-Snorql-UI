name: Docker Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/marvinm2/aop-wiki-snorql-ui
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=AOP-Wiki RDF Explorer
            org.opencontainers.image.description=SPARQL query interface for the AOP-Wiki RDF endpoint
            org.opencontainers.image.vendor=TGX (Translational Genomics, Maastricht University)
            org.opencontainers.image.source=https://github.com/marvinm2/AOP-Wiki-Snorql-UI
            org.opencontainers.image.licenses=GPL-3.0-or-later

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Docker Compose configuration
        run: |
          cp .env.example .env
          cp docker-compose.example.yml docker-compose.yml
          docker compose config --quiet
